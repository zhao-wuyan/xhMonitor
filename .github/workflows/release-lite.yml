name: Release

on:
  release:
    types: [published]

permissions:
  actions: write
  contents: write

jobs:
  build-assets:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release.tag_name is empty"
          }

          $version = $tag.TrimStart('v', 'V')
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Resolved version is empty (tag='$tag')"
          }

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "TAG=$tag"
          Write-Host "VERSION=$version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: xhmonitor-web/package-lock.json

      - name: Sync version to Directory.Build.props
        shell: pwsh
        run: |
          $buildPropsPath = "Directory.Build.props"
          [xml]$buildProps = Get-Content $buildPropsPath

          # 更新版本号
          $buildProps.Project.PropertyGroup.Version = $env:VERSION
          $buildProps.Project.PropertyGroup.AssemblyVersion = "$env:VERSION.0"
          $buildProps.Project.PropertyGroup.FileVersion = "$env:VERSION.0"

          $buildProps.Save("$PWD\$buildPropsPath")
          Write-Host "Updated Directory.Build.props to version $env:VERSION"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Download Chinese language file for Inno Setup
        shell: pwsh
        run: |
          $innoLangDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $langFile = "$innoLangDir\ChineseSimplified.isl"

          if (-not (Test-Path $langFile)) {
            Write-Host "Downloading ChineseSimplified.isl..."
            New-Item -ItemType Directory -Force -Path $innoLangDir | Out-Null
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile $langFile
            Write-Host "Downloaded ChineseSimplified.isl successfully"
          } else {
            Write-Host "ChineseSimplified.isl already exists"
          }

      - name: Download .NET Desktop Runtime for bundling
        shell: pwsh
        run: |
          $runtimeDir = "tools\RuntimePkg"
          $runtimeFile = "windowsdesktop-runtime-8.0.23-win-x64.exe"
          $runtimeUrl = "https://builds.dotnet.microsoft.com/dotnet/WindowsDesktop/8.0.23/$runtimeFile"

          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          $runtimePath = Join-Path $runtimeDir $runtimeFile

          Write-Host "Downloading .NET Desktop Runtime 8.0.23..."
          Invoke-WebRequest -Uri $runtimeUrl -OutFile $runtimePath

          if (Test-Path $runtimePath) {
            $size = (Get-Item $runtimePath).Length / 1MB
            Write-Host "Downloaded: $runtimePath ($([math]::Round($size, 2)) MB)"
          } else {
            throw "Failed to download .NET Desktop Runtime"
          }

      # ===========================================
      # Build 1: Lite (no .NET runtime)
      # ===========================================
      - name: Build Lite ZIP
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\publish.ps1 -Version $env:VERSION -Lite

          $zipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION.zip"
          if (-not (Test-Path $zipPath)) {
            throw "ZIP not found: $zipPath"
          }

          # 重命名为 Lite 版本
          $liteZipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Lite.zip"
          Move-Item $zipPath $liteZipPath -Force
          Write-Host "Lite ZIP: $liteZipPath"

      - name: Build Lite Installer
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\build-installer.ps1 -Version $env:VERSION -BuildType Lite -SkipPublish

          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Lite-Setup.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Lite Installer not found: $setupPath"
          }
          Write-Host "Lite Installer: $setupPath"

      # ===========================================
      # Build 2: Lite with .NET runtime installer
      # ===========================================
      - name: Build Lite-Net8 Installer
        shell: pwsh
        run: |
          # 不需要重新发布，使用之前 Lite 的发布产物
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\build-installer.ps1 -Version $env:VERSION -BuildType LiteNet8 -SkipPublish

          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Lite-Net8-Setup.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Lite-Net8 Installer not found: $setupPath"
          }
          Write-Host "Lite-Net8 Installer: $setupPath"

      # 保存 Lite 产物到临时目录（publish.ps1 会清理 release 目录）
      - name: Backup Lite artifacts
        shell: pwsh
        run: |
          $backupDir = "release-lite-backup"
          New-Item -ItemType Directory -Force -Path $backupDir | Out-Null

          Move-Item "release\XhMonitor-v$env:VERSION-Lite.zip" $backupDir -Force
          Move-Item "release\XhMonitor-v$env:VERSION-Lite-Setup.exe" $backupDir -Force
          Move-Item "release\XhMonitor-v$env:VERSION-Lite-Net8-Setup.exe" $backupDir -Force

          Write-Host "Backed up Lite artifacts to $backupDir"

      # ===========================================
      # Build 3: Full (self-contained)
      # ===========================================
      - name: Build Full ZIP
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\publish.ps1 -Version $env:VERSION

          $zipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION.zip"
          if (-not (Test-Path $zipPath)) {
            throw "ZIP not found: $zipPath"
          }

          # 重命名为 Full 版本
          $fullZipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Full.zip"
          Move-Item $zipPath $fullZipPath -Force
          Write-Host "Full ZIP: $fullZipPath"

      - name: Build Full Installer
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\build-installer.ps1 -Version $env:VERSION -BuildType Full -SkipPublish

          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Full-Setup.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Full Installer not found: $setupPath"
          }
          Write-Host "Full Installer: $setupPath"

      # 恢复 Lite 产物
      - name: Restore Lite artifacts
        shell: pwsh
        run: |
          $backupDir = "release-lite-backup"

          Move-Item "$backupDir\*" "release\" -Force
          Remove-Item $backupDir -Force -Recurse

          Write-Host "Restored Lite artifacts"

      # ===========================================
      # Upload all assets
      # ===========================================
      - name: List release files
        shell: pwsh
        run: |
          Write-Host "Release files:"
          Get-ChildItem -Path "release" -Filter "*.exe" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) ($size MB)"
          }
          Get-ChildItem -Path "release" -Filter "*.zip" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) ($size MB)"
          }

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            "release\XhMonitor-v$env:VERSION-Lite.zip",
            "release\XhMonitor-v$env:VERSION-Lite-Setup.exe",
            "release\XhMonitor-v$env:VERSION-Lite-Net8-Setup.exe",
            "release\XhMonitor-v$env:VERSION-Full.zip",
            "release\XhMonitor-v$env:VERSION-Full-Setup.exe"
          )

          foreach ($asset in $assets) {
            if (Test-Path $asset) {
              Write-Host "Uploading: $asset"
            } else {
              Write-Host "Warning: $asset not found"
            }
          }

          gh release upload $env:TAG @assets --clobber

      - name: Trigger sync-latest-release workflow
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "Triggering sync-latest-release workflow for tag: $env:TAG"
          gh workflow run sync-latest-release.yml -f source_tag="$env:TAG"
