name: Release (Lite)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-lite-assets:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release.tag_name is empty"
          }

          $version = $tag.TrimStart('v', 'V')
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Resolved version is empty (tag='$tag')"
          }

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "TAG=$tag"
          Write-Host "VERSION=$version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: xhmonitor-web/package-lock.json

      - name: Build lite zip
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\publish.ps1 -Version $env:VERSION -Lite

          $zipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION.zip"
          if (-not (Test-Path $zipPath)) {
            throw "ZIP not found: $zipPath"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build lite installer
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\build-installer.ps1 -Version $env:VERSION -Lite -SkipPublish

          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Setup.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Installer not found: $setupPath"
          }

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION.zip"
          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Setup.exe"

          gh release upload $env:TAG $zipPath $setupPath --clobber

