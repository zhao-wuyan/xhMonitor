name: Release (Lite)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-lite-assets:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release.tag_name is empty"
          }

          $version = $tag.TrimStart('v', 'V')
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Resolved version is empty (tag='$tag')"
          }

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "TAG=$tag"
          Write-Host "VERSION=$version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: xhmonitor-web/package-lock.json

      - name: Build lite zip
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\publish.ps1 -Version $env:VERSION -Lite

          $zipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION.zip"
          if (-not (Test-Path $zipPath)) {
            throw "ZIP not found: $zipPath"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Download Chinese language file for Inno Setup
        shell: pwsh
        run: |
          $innoLangDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $langFile = "$innoLangDir\ChineseSimplified.isl"

          if (-not (Test-Path $langFile)) {
            Write-Host "Downloading ChineseSimplified.isl..."
            New-Item -ItemType Directory -Force -Path $innoLangDir | Out-Null
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile $langFile
            Write-Host "Downloaded ChineseSimplified.isl successfully"
          } else {
            Write-Host "ChineseSimplified.isl already exists"
          }

      - name: Download .NET Desktop Runtime for bundling
        shell: pwsh
        run: |
          $runtimeDir = "tools\RuntimePkg"
          $runtimeFile = "windowsdesktop-runtime-8.0.23-win-x64.exe"
          $runtimeUrl = "https://builds.dotnet.microsoft.com/dotnet/WindowsDesktop/8.0.23/$runtimeFile"

          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          $runtimePath = Join-Path $runtimeDir $runtimeFile

          Write-Host "Downloading .NET Desktop Runtime 8.0.23..."
          Invoke-WebRequest -Uri $runtimeUrl -OutFile $runtimePath

          if (Test-Path $runtimePath) {
            $size = (Get-Item $runtimePath).Length / 1MB
            Write-Host "Downloaded: $runtimePath ($([math]::Round($size, 2)) MB)"
          } else {
            throw "Failed to download .NET Desktop Runtime"
          }

      - name: Build lite installer
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\build-installer.ps1 -Version $env:VERSION -Lite -SkipPublish

          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Setup.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Installer not found: $setupPath"
          }

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zipPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION.zip"
          $setupPath = Join-Path $PWD "release\XhMonitor-v$env:VERSION-Setup.exe"

          gh release upload $env:TAG $zipPath $setupPath --clobber

