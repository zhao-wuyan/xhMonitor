name: Sync Latest Release

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 源 release tag。留空时优先使用当前选择的 tag ref，例如 v0.2.13
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync-latest:
    if: ${{ github.event_name != 'release' || (github.event.release.tag_name != 'latest' && !github.event.release.prerelease) }}
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Resolve source release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_TAG="${{ inputs.source_tag }}"
            REF_TYPE="${{ github.ref_type }}"
            REF_NAME="${{ github.ref_name }}"

            if [[ -n "$INPUT_TAG" ]]; then
              TAG="$INPUT_TAG"
              echo "Using source_tag input: $TAG"
            elif [[ "$REF_TYPE" == "tag" && -n "$REF_NAME" ]]; then
              TAG="$REF_NAME"
              echo "Using workflow ref tag: $TAG"
            else
              echo "For workflow_dispatch, choose a tag ref or fill source_tag." >&2
              exit 1
            fi
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Source release tag is empty." >&2
            exit 1
          fi

          if [[ "$TAG" == "latest" ]]; then
            echo "Source release tag cannot be latest." >&2
            exit 1
          fi

          if ! gh release view "$TAG" -R "$GH_REPO" >/dev/null 2>&1; then
            echo "No published release found for tag: $TAG" >&2
            exit 1
          fi

          IS_PRERELEASE="$(gh release view "$TAG" -R "$GH_REPO" --json isPrerelease --jq '.isPrerelease')"
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Source release tag $TAG is a prerelease and cannot be synced to latest." >&2
            exit 1
          fi

          SOURCE_COMMIT="$(gh api "repos/${GH_REPO}/commits/$TAG" --jq '.sha')"
          if [[ -z "$SOURCE_COMMIT" ]]; then
            echo "Failed to resolve commit SHA for source tag: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Resolved version is empty (tag=$TAG)." >&2
            exit 1
          fi

          {
            echo "TAG=$TAG"
            echo "SOURCE_COMMIT=$SOURCE_COMMIT"
            echo "VERSION=$VERSION"
            echo "EXPECTED_LITE_SETUP=XhMonitor-v$VERSION-Lite-Setup.exe"
          } >> "$GITHUB_ENV"

      - name: Wait for source release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 40); do
            ASSET_COUNT="$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.assets | length')"
            HAS_LITE_SETUP="$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.assets[].name' | grep -Fx "$EXPECTED_LITE_SETUP" || true)"

            echo "Attempt $attempt: assets=$ASSET_COUNT"
            if [[ "$ASSET_COUNT" -ge 5 && -n "$HAS_LITE_SETUP" ]]; then
              echo "Source release assets are ready."
              exit 0
            fi

            sleep 15
          done

          echo "Timed out waiting for source release assets." >&2
          exit 1

      - name: Download source assets and notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf latest-assets
          mkdir -p latest-assets

          gh release download "$TAG" -R "$GH_REPO" -D latest-assets
          gh release view "$TAG" -R "$GH_REPO" --json body --jq '.body' > latest-release-body.txt

          echo "Downloaded assets:"
          ls -lah latest-assets

      - name: Recreate latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest -R "$GH_REPO" >/dev/null 2>&1; then
            gh release delete latest -R "$GH_REPO" --yes --cleanup-tag
          fi

          {
            echo "同步自正式 release $TAG"
            echo
            cat latest-release-body.txt
          } > latest-release-notes.txt

          gh release create latest \
            -R "$GH_REPO" \
            --target "$SOURCE_COMMIT" \
            --title "v$VERSION" \
            --notes-file latest-release-notes.txt \
            --latest=false

      - name: Upload assets to latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest -R "$GH_REPO" latest-assets/* --clobber
